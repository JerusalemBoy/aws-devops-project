name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region eu-north-1 \
        | docker login --username AWS --password-stdin 139945942335.dkr.ecr.eu-north-1.amazonaws.com

    - name: Build Docker image
      run: |
        docker build -t devops-node-app .

    - name: Tag image
      run: |
        docker tag devops-node-app:latest 139945942335.dkr.ecr.eu-north-1.amazonaws.com/devops-node-app:latest

    - name: Push to ECR
      run: |
        docker push 139945942335.dkr.ecr.eu-north-1.amazonaws.com/devops-node-app:latest

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region eu-north-1 --name devops-cluster

    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
