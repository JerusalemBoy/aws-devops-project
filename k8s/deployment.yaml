apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: devops-app
        image: 139945942335.dkr.ecr.eu-north-1.amazonaws.com/devops-node-app:latest
        ports:
        - containerPort: 3000
